<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">

    <!-- Tags Mágicas para virar Web App Nativo -->
    <meta name="theme-color" content="#0a0a0c">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">

    <title>Acesso Restrito | Mestre Kenobi</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/auth.css">
</head>

<body>

    <!-- Estrutura Principal Full Screen -->
    <main class="authFullscreenLayout">

        <!-- Coluna Esquerda: Onde entrará o vídeo ou imagem -->
        <section class="mediaSection">
            <!-- Vídeo em background -->
            <!-- Verifique se o caminho src="assets/video/..." está correto em relação a onde o login.html está salvo -->
            <video id="bgVideo" src="assets/video/videoauth.mp4" autoplay loop muted playsinline
                class="bgMedia"></video>

            <!-- Áudio separado -->
            <!-- Áudio separado (sem autoplay) -->
            <audio id="bgAudio" src="assets/audio/across.mp3" loop></audio>

            <!-- A camada de gradiente com transparência -->
            <div class="mediaOverlay"></div>

            <!-- Controles de Mídia Minimalistas -->
            <div class="mediaControlsMinimal">
                <button id="playPauseBtn" class="controlBtnMinimal">
                    <span class="icon" id="playPauseIcon">
                        <!-- SVG de Pause (pois o vídeo inicia no autoplay) -->
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"
                            xmlns="http://www.w3.org/2000/svg">
                            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                        </svg>
                    </span>
                    <span id="playPauseText">Pausar</span>
                </button>
                <div class="volumeControlMinimal">
                    <span class="icon">♪</span>
                    <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.3" class="sliderMinimal">
                </div>
            </div>
        </section>

        <!-- Coluna Direita: O Formulário com fundo preto -->
        <section class="formSection">
            <div class="formContent">

                <!-- CAIXA DE LOGIN (Mantendo seus textos originais) -->
                <div id="loginBox" class="formBox">
                    <div class="formHeader">
                        <h2>Acesso Restrito</h2>
                        <p>Insira suas credenciais para entrar no sistema.</p>
                    </div>

                    <form id="loginForm">
                        <div class="inputGroup">
                            <label for="username">Identificação</label>
                            <input type="text" id="username" placeholder="ex. mestre@jedi.com" required>
                        </div>

                        <div class="inputGroup">
                            <label for="password">Senha de acesso</label>
                            <div class="passwordWrapper">
                                <input type="password" id="password" placeholder="••••••••" required>
                                <button type="button" class="togglePassword" aria-label="Mostrar/Ocultar senha">
                                    <!-- Ícone de Olho Aberto -->
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                        <circle cx="12" cy="12" r="3"></circle>
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <button type="submit" class="btnSolid">Acessar</button>
                    </form>

                    <div class="formFooter">
                        <span>Ainda não tem acesso? <a href="#" id="linkRegister">Cadastre-se</a></span>
                    </div>
                </div>

                <!-- CAIXA DE CADASTRO (Inicia Oculta e seguindo seu padrão) -->
                <div id="registerBox" class="formBox hidden">
                    <div class="formHeader">
                        <h2>Novo Recruta</h2>
                        <p>Registre seus dados na rede segura.</p>
                    </div>

                    <form id="registerForm">
                        <div class="inputGroup">
                            <label for="regName">Nome de Operativo</label>
                            <input type="text" id="regName" placeholder="Seu nome" required>
                        </div>

                        <!-- Campo Custom Select: Tratamento -->
                        <div class="inputGroup">
                            <label>Título de Tratamento</label>
                            
                            <!-- Container principal do Custom Select -->
                            <div class="customSelectWrapper" id="treatmentSelect">
                                <!-- O input invisível que vai guardar o valor "M" ou "F" -->
                                <input type="hidden" id="regTreatment" required>
                                
                                <!-- A barra onde o usuário clica -->
                                <div class="customSelectTrigger">
                                    <span>Selecione seu título...</span>
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="chevronIcon">
                                        <polyline points="6 9 12 15 18 9"></polyline>
                                    </svg>
                                </div>
                                
                                <!-- A lista flutuante de opções -->
                                <ul class="customSelectOptions">
                                    <li data-value="M">Mestre (Masculino)</li>
                                    <li data-value="F">Mestra (Feminino)</li>
                                </ul>
                            </div>
                        </div>

                        <div class="inputGroup">
                            <label for="regEmail">Identificação (E-mail)</label>
                            <input type="email" id="regEmail" placeholder="ex. padawan@jedi.com" required>
                        </div>

                        <div class="inputGroup">
                            <label for="regPassword">Senha de acesso</label>
                            <div class="passwordWrapper">
                                <input type="password" id="regPassword" placeholder="Crie uma senha forte" required>
                                <button type="button" class="togglePassword" aria-label="Mostrar/Ocultar senha">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                        <circle cx="12" cy="12" r="3"></circle>
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <div class="inputGroup">
                            <label for="regConfirmPassword">Confirmar senha</label>
                            <div class="passwordWrapper">
                                <input type="password" id="regConfirmPassword" placeholder="Repita a senha forte" required>
                                <button type="button" class="togglePassword" aria-label="Mostrar/Ocultar senha">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                        <circle cx="12" cy="12" r="3"></circle>
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <button type="submit" class="btnSolid">Cadastrar</button>
                    </form>

                    <div class="formFooter">
                        <span>Já possui credenciais? <a href="#" id="linkLogin">Acessar</a></span>
                    </div>
                </div>

            </div>
        </section>

    </main>

<!-- Script Oficial do Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Seus scripts na ordem correta -->
    <script src="js/config.js"></script>
    <script src="js/api.js"></script> <!-- Adicionamos o api.js aqui -->
    <script src="js/auth.js"></script>

    <!-- Container de Toasts (Avisos do Sistema) -->
<div id="toastContainer" class="toast-container"></div>
</body>
</html>
